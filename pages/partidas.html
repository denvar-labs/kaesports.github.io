<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partidas – KA ESPORTS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">KA ESPORTS</div>
      <h1>Historial de Partidas</h1>
      <p>Todas las partidas procesadas por el sistema.</p>
    </header>
    <div class="grid">
      <div id="sidebar-container"></div>
      <main class="content">
        <section class="panel">
          <div class="section-heading">Partidas</div>
          <div class="updates-box">
            <table id="data-table">
              <thead></thead>
              <tbody><tr><td colspan="10">Cargando...</td></tr></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../js/api-loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => loadDataIntoTable('MATCHES', 'data-table'));
  </script>
  <script>
    fetch("../sidebar.html").then(r => r.text()).then(html => {
      document.getElementById("sidebar-container").innerHTML = html;
    });
  </script>
</body>
</html>
