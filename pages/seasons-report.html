<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seasons Report – KA ESPORTS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">KA ESPORTS</div>
      <h1>Seasons Report</h1>
      <p>Summary of all recorded seasons.</p>
    </header>
    <div class="grid">
      <div id="sidebar-container"></div>
      <main class="content">
        <section class="panel">
          <div class="section-heading">Seasons Summary</div>
          <div class="table-responsive">
            <table id="data-table" class="data-table">
              <thead></thead>
              <tbody><tr><td colspan="20">Loading…</td></tr></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="../js/api-loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => loadTableFromSheet('SEASONS_REPORT', 'data-table', -1));
  </script>
  <script>
    fetch("../sidebar.html").then(r => r.text()).then(html => {
      document.getElementById("sidebar-container").innerHTML = html;
    });
  </script>
</body>
</html>
